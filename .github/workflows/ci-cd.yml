name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint frontend
        run: cd frontend && npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run backend tests
        run: cd backend && npm test
        env:
          DATABASE_URL: mongodb://localhost:27017/triplens-test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          GOOGLE_CLIENT_ID: test-google-client-id
          NODE_ENV: test
          PORT: 5000
          CORS_ORIGINS: http://localhost:5173

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Build backend
        run: cd backend && npm run build

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

  deploy:
    name: Deploy to Linux Server
    runs-on: ubuntu-latest
    needs: build
    # TODO: Change back to: if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Temporarily deploying on PR for testing
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          echo "Setting up SSH..."
          mkdir -p ~/.ssh
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "ERROR: SERVER_HOST secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "ERROR: SERVER_USER secret is not set!"
            exit 1
          fi
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "SSH key saved and permissions set"
          echo "Scanning host keys..."
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          echo "SSH setup complete"
        continue-on-error: false

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          cd /home/node12/TripLens-FSD
          
          # Pull latest code from mongo branch (for testing)
          git pull origin mongo
          
          # Install/update dependencies for backend
          cd backend
          npm install
          npm run build
          
          # Restart backend with PM2
          pm2 restart triplens-backend || pm2 start ecosystem.config.js
          
          # Install/update dependencies for frontend
          cd ../frontend
          npm install
          npm run build
          
          # If using a web server (nginx/apache), restart it
          # sudo systemctl restart nginx
          
          echo "Deployment completed successfully!"
          EOF

      - name: Deployment Notification
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
